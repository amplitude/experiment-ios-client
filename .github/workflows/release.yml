name: Release

on:
  workflow_dispatch:
    inputs:
      dryRun:
        description: "Do a dry run to preview instead of a real release"
        required: true
        default: "true"

jobs:
  authorize:
    name: Authorize
    runs-on: ubuntu-latest
    steps:
      - name: ${{ github.actor }} permission check to do a release
        uses: octokit/request-action@57ec46afcc4c58c813af3afe67e57ced1ea9f165 # v2.0.0
        with:
          route: GET /repos/:repository/collaborators/${{ github.actor }}
          repository: ${{ github.repository }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  test:
    name: Test (${{ matrix.platform }})
    runs-on: macos-15
    needs: [authorize]
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: iOS
            sdk: iphonesimulator
            destination: 'platform=iOS Simulator,name=iPhone 16,OS=latest'
            download-runtime: iOS
          - platform: macOS
            sdk: macosx
            destination: 'platform=macOS'
            download-runtime: ''
          - platform: tvOS
            sdk: appletvsimulator
            destination: 'platform=tvOS Simulator,name=Apple TV,OS=latest'
            download-runtime: tvOS
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set Xcode 16.3
        run: |
          sudo xcode-select -switch /Applications/Xcode_16.3.app
          xcodebuild -runFirstLaunch

      - name: Install Simulator Runtime
        if: matrix.download-runtime != ''
        run: |
          xcrun simctl list > /dev/null
          sudo xcodebuild -downloadPlatform ${{ matrix.download-runtime }}

      - name: Carthage Bootstrap
        run: carthage bootstrap --use-xcframeworks
        env:
          GITHUB_ACCESS_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run Tests
        run: |
          xcodebuild test \
            -project Experiment.xcodeproj \
            -scheme Experiment \
            -sdk ${{ matrix.sdk }} \
            -destination '${{ matrix.destination }}'

  release:
    name: Release
    runs-on: macos-15
    needs: [test]
    env:
      SWIFT_DOC_VERSION: '1.0.0-rc.1'
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set Xcode 16.3
        run: |
          sudo xcode-select -switch /Applications/Xcode_16.3.app

      - name: Set up Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '22'

      - name: Validate Podfile
        run: pod lib lint --allow-warnings --verbose

      - name: Semantic Release --dry-run
        if: ${{ github.event.inputs.dryRun == 'true'}}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          COCOAPODS_TRUNK_TOKEN: ${{ secrets.COCOAPODS_TRUNK_TOKEN }}
          GIT_AUTHOR_NAME: amplitude-sdk-bot
          GIT_AUTHOR_EMAIL: amplitude-sdk-bot@users.noreply.github.com
          GIT_COMMITTER_NAME: amplitude-sdk-bot
          GIT_COMMITTER_EMAIL: amplitude-sdk-bot@users.noreply.github.com
        run: |
          npm ci
          npm exec semantic-release -- --dry-run

      - name: Semantic Release
        if: ${{ github.event.inputs.dryRun == 'false'}}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          COCOAPODS_TRUNK_TOKEN: ${{ secrets.COCOAPODS_TRUNK_TOKEN }}
          GIT_AUTHOR_NAME: amplitude-sdk-bot
          GIT_AUTHOR_EMAIL: amplitude-sdk-bot@users.noreply.github.com
          GIT_COMMITTER_NAME: amplitude-sdk-bot
          GIT_COMMITTER_EMAIL: amplitude-sdk-bot@users.noreply.github.com
        run: |
          npm ci
          npm exec semantic-release
